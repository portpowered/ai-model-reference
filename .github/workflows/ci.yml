# Maintainer deploy and release policy: docs/operations.md
# This workflow fans CI gates out into parallel jobs, then reports a final `ci`
# status for branch protection. It does not deploy or run preview steps.
name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  gate:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: lint
            command: make lint
          - name: internal-typecheck
            command: make internal-typecheck
          - name: test
            command: make test
            website_test_parallel_workers: 1
          - name: internal-test-verify-contract
            command: make internal-test-verify-contract
            install_playwright: true
          - name: internal-coverage
            command: make internal-coverage
          - name: internal-test-build-contract
            command: make internal-test-build-contract
            install_playwright: true
          - name: internal-build-export
            command: make internal-build-export
            install_playwright: true
          - name: internal-test-integration
            command: make internal-test-integration
            install_playwright: true
          - name: internal-validate-data
            command: make internal-validate-data
          - name: internal-linkcheck
            command: make internal-linkcheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        if: ${{ matrix.install_playwright }}
        run: bunx playwright install chromium --with-deps

      - name: Run ${{ matrix.name }}
        env:
          WEBSITE_TEST_PARALLEL_WORKERS: ${{ matrix.website_test_parallel_workers }}
        run: ${{ matrix.command }}

  ci:
    name: ci
    runs-on: ubuntu-latest
    needs: gate
    if: ${{ always() }}
    permissions:
      contents: read
    steps:
      - name: Verify parallel gates passed
        run: |
          if [ "${{ needs.gate.result }}" != "success" ]; then
            echo "One or more CI gates failed."
            exit 1
          fi
