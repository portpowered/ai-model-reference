# Maintainer deploy and release policy: docs/operations.md
# This workflow fans CI gates out into parallel jobs, then reports a final `ci`
# status for branch protection. It does not deploy or run preview steps.
name: CI

env:
  CI_COMMAND_TIMEOUT_SECONDS: 300
  CI_SCRIPT_TIMEOUT_MS: 300000

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  gate:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: lint
            command: make lint
          - name: typecheck
            command: make typecheck
          - name: test
            command: make test
            website_test_parallel_workers: 1
            timeout_minutes: 7
            ci_command_timeout_seconds: 420
          - name: test-verify-contract
            command: make test-verify-contract
            install_playwright: true
          - name: coverage
            command: make coverage
          - name: test-build-contract
            command: make test-build-contract
            install_playwright: true
          - name: build-export
            command: make build-export
            install_playwright: true
          - name: test-integration
            command: make test-integration
            install_playwright: true
          - name: validate-data
            command: make validate-data
          - name: linkcheck
            command: make linkcheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        if: ${{ matrix.install_playwright }}
        run: bunx playwright install chromium --with-deps

      - name: Run ${{ matrix.name }}
        timeout-minutes: ${{ matrix.timeout_minutes || 5 }}
        env:
          CI_SCRIPT_TIMEOUT_MS: ${{ env.CI_SCRIPT_TIMEOUT_MS }}
          CI_COMMAND_TIMEOUT_SECONDS: ${{ matrix.ci_command_timeout_seconds || env.CI_COMMAND_TIMEOUT_SECONDS }}
          WEBSITE_TEST_PARALLEL_WORKERS: ${{ matrix.website_test_parallel_workers }}
        run: |
          timeout --signal=TERM --kill-after=30s "${CI_COMMAND_TIMEOUT_SECONDS}s" bash -lc "${{ matrix.command }}"

  ci:
    name: ci
    runs-on: ubuntu-latest
    needs: gate
    if: ${{ always() }}
    permissions:
      contents: read
    steps:
      - name: Verify parallel gates passed
        run: |
          if [ "${{ needs.gate.result }}" != "success" ]; then
            echo "One or more CI gates failed."
            exit 1
          fi
